<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ El Omda Ticket - نسخة التذكرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', 'Cairo', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f12 0%, #1a1b1e 100%);
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(88, 101, 242, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(87, 242, 135, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 40% 80%, rgba(250, 166, 26, 0.1) 0%, transparent 30%);
            animation: backgroundPulse 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(47, 49, 54, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(88, 101, 242, 0.3),
                0 0 30px rgba(88, 101, 242, 0.2);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            animation: containerAppear 0.8s ease-out;
        }

        @keyframes containerAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* تأثير الإضاءة المتحركة على الحواف */
        .container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                #5865f2, #57f287, #faa61a, #9b59b6, #5865f2);
            background-size: 400% 400%;
            border-radius: 26px;
            opacity: 0;
            z-index: -1;
            animation: borderGlow 6s ease-in-out infinite;
            filter: blur(5px);
        }

        .container:hover::before {
            opacity: 0.7;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; opacity: 0.3; }
            50% { background-position: 100% 50%; opacity: 0.7; }
        }

        /* الهيدر */
        .header {
            background: linear-gradient(145deg, 
                rgba(32, 34, 37, 0.95), 
                rgba(42, 44, 48, 0.95));
            padding: 35px 40px;
            border-bottom: 1px solid rgba(88, 101, 242, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background: linear-gradient(
                135deg,
                transparent 30%,
                rgba(88, 101, 242, 0.1) 50%,
                transparent 70%
            );
            animation: headerShine 8s linear infinite;
            transform: rotate(45deg);
        }

        @keyframes headerShine {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .header h1 {
            color: #fff;
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-shadow: 0 2px 10px rgba(88, 101, 242, 0.3);
            position: relative;
        }

        .header h1 span {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 5px 20px rgba(88, 101, 242, 0.4); }
            50% { box-shadow: 0 10px 30px rgba(88, 101, 242, 0.8); }
        }

        .ticket-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
        }

        .ticket-info div {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 12px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #b9bbbe;
            font-size: 15px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .ticket-info div:nth-child(1) { animation-delay: 0.1s; }
        .ticket-info div:nth-child(2) { animation-delay: 0.2s; }
        .ticket-info div:nth-child(3) { animation-delay: 0.3s; }
        .ticket-info div:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ticket-info div::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: rotate(45deg);
            animation: cardShine 4s ease-in-out infinite;
        }

        @keyframes cardShine {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .ticket-info div:hover {
            transform: translateY(-2px);
            border-color: #5865f2;
            box-shadow: 0 5px 20px rgba(88, 101, 242, 0.3);
        }

        .ticket-info div strong {
            color: #fff;
            margin-left: 8px;
        }

        /* شريط المعلومات */
        .info-bar {
            background: rgba(47, 49, 54, 0.9);
            backdrop-filter: blur(5px);
            padding: 30px 35px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            animation: scaleIn 0.5s ease-out backwards;
            position: relative;
            overflow: hidden;
        }

        .info-item:nth-child(1) { animation-delay: 0.1s; }
        .info-item:nth-child(2) { animation-delay: 0.2s; }
        .info-item:nth-child(3) { animation-delay: 0.3s; }
        .info-item:nth-child(4) { animation-delay: 0.4s; }
        .info-item:nth-child(5) { animation-delay: 0.5s; }
        .info-item:nth-child(6) { animation-delay: 0.6s; }
        .info-item:nth-child(7) { animation-delay: 0.7s; }
        .info-item:nth-child(8) { animation-delay: 0.8s; }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .info-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(88, 101, 242, 0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .info-item:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: #5865f2;
            box-shadow: 
                0 10px 30px rgba(88, 101, 242, 0.3),
                0 0 0 1px #5865f2;
        }

        .info-item:hover::after {
            opacity: 1;
        }

        .info-item .label {
            color: #72767d;
            font-size: 13px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
        }

        .info-item .value {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            position: relative;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .info-item .value.user {
            color: #5865f2;
            animation: textGlow 2s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(88, 101, 242, 0.3); }
            50% { text-shadow: 0 0 20px rgba(88, 101, 242, 0.7); }
        }

        /* منطقة المحادثة */
        .chat-container {
            padding: 30px 35px;
            background: rgba(54, 57, 63, 0.9);
            backdrop-filter: blur(5px);
        }

        /* كل رسالة */
        .message {
            display: flex;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
            animation: slideIn 0.5s ease-out backwards;
            transition: all 0.3s ease;
        }

        .message:hover {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            padding-right: 10px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            margin-left: 20px;
            flex-shrink: 0;
            object-fit: cover;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #5865f2, #57f287) border-box;
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            animation: avatarGlow 3s ease-in-out infinite;
        }

        @keyframes avatarGlow {
            0%, 100% { border-color: rgba(88, 101, 242, 0.5); }
            50% { border-color: rgba(87, 242, 135, 0.8); }
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .author {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            position: relative;
            display: inline-block;
        }

        .author::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #5865f2, transparent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .message:hover .author::after {
            transform: scaleX(1);
        }

        .author.bot {
            color: #5865f2;
            text-shadow: 0 0 10px rgba(88, 101, 242, 0.5);
        }

        .author.support {
            color: #57f287;
            text-shadow: 0 0 10px rgba(87, 242, 135, 0.5);
        }

        .timestamp {
            color: #72767d;
            font-size: 13px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
        }

        .message-text {
            color: #dcddde;
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 8px 0;
        }

        /* تنسيق الأسئلة والأجوبة */
        .questions-section {
            background: linear-gradient(145deg, rgba(32, 34, 37, 0.9), rgba(42, 44, 48, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(88, 101, 242, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .questions-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(88, 101, 242, 0.2), transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .questions-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(88, 101, 242, 0.3);
            position: relative;
        }

        .questions-title-icon {
            background: linear-gradient(135deg, #5865f2, #57f287);
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: iconPulse 2s ease-in-out infinite;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(88, 101, 242, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(87, 242, 135, 0.7); }
        }

        .questions-title-text {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(88, 101, 242, 0.5);
        }

        .question-card {
            background: rgba(32, 34, 37, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .question-card:hover {
            transform: translateX(-5px);
            border-color: #5865f2;
            box-shadow: 0 10px 30px rgba(88, 101, 242, 0.3);
        }

        .question-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #5865f2, #57f287);
            animation: heightPulse 2s ease-in-out infinite;
        }

        @keyframes heightPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #5865f2, #57f287);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
            animation: numberGlow 2s ease-in-out infinite;
        }

        @keyframes numberGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(88, 101, 242, 0.5); }
            50% { box-shadow: 0 0 20px rgba(87, 242, 135, 0.8); }
        }

        .question-label {
            color: #b9bbbe;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .question-text {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-right: 40px;
        }

        .answer-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-right: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 4px solid #57f287;
            position: relative;
            transition: all 0.3s ease;
        }

        .answer-box:hover {
            background: rgba(0, 0, 0, 0.4);
            border-right-color: #5865f2;
        }

        .answer-label {
            position: absolute;
            top: -10px;
            right: 15px;
            background: #202225;
            color: #57f287;
            font-size: 11px;
            padding: 3px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .answer-content {
            color: #dcddde;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* تنسيق المنشنات والرتب */
        .user-mention {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            color: white;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            font-size: 0.95em;
            margin: 3px 5px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(88, 101, 242, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
            animation: mentionPulse 2s ease-in-out infinite;
        }

        .user-mention:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.5);
        }

        @keyframes mentionPulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        .role-mention {
            color: white;
            padding: 5px 16px;
            border-radius: 30px;
            font-weight: 600;
            display: inline-block;
            margin: 3px 5px;
            font-size: 0.95em;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            animation: roleGlow 2s ease-in-out infinite;
        }

        .role-mention:hover {
            transform: translateY(-2px) scale(1.05);
            filter: brightness(1.2);
            box-shadow: 0 8px 20px currentColor;
        }

        @keyframes roleGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.1); }
        }

        /* الامبيدات */
        .embed {
            margin-top: 15px;
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(10px);
            border-right: 4px solid;
            border-radius: 12px;
            padding: 20px 25px;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: embedAppear 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }

        .embed::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 70%);
            animation: embedRotate 15s linear infinite;
        }

        @keyframes embedRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes embedAppear {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .embed-title {
            color: #fff;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 16px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .embed-description {
            color: #dcddde;
            font-size: 15px;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .embed-field {
            margin-top: 15px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .embed-field:last-child {
            border-bottom: none;
        }

        .embed-field-name {
            color: #b9bbbe;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 15px;
            line-height: 1.6;
        }

        .embed-image {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .embed-image:hover {
            transform: scale(1.02);
            border-color: #5865f2;
        }

        /* الرسائل النظامية */
        .system-message {
            background: linear-gradient(145deg, rgba(32, 34, 37, 0.9), rgba(42, 44, 48, 0.9));
            backdrop-filter: blur(10px);
            color: #b9bbbe;
            padding: 18px 30px;
            border-radius: 50px;
            text-align: center;
            font-size: 15px;
            margin: 25px 0;
            border: 1px solid rgba(88, 101, 242, 0.3);
            position: relative;
            overflow: hidden;
            animation: systemPulse 3s ease-in-out infinite;
        }

        @keyframes systemPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(88, 101, 242, 0.2); }
            50% { box-shadow: 0 0 40px rgba(88, 101, 242, 0.5); }
        }

        .system-message::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent,
                rgba(88, 101, 242, 0.1),
                transparent
            );
            animation: systemShine 6s linear infinite;
        }

        @keyframes systemShine {
            0% { transform: rotate(45deg) translateX(-100%); }
            100% { transform: rotate(45deg) translateX(100%); }
        }

        .system-message strong {
            color: #fff;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* المرفقات */
        .attachment-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(32, 34, 37, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            margin: 8px 0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .attachment-link:hover {
            background: #5865f2;
            color: white;
            transform: translateX(-5px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 20px;
            padding: 30px 35px;
            background: rgba(32, 34, 37, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.05);
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5865f2, #4752c4);
            color: white;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(88, 101, 242, 0.7);
        }

        .btn-success {
            background: linear-gradient(135deg, #57f287, #46c572);
            color: #2f3136;
            box-shadow: 0 10px 25px rgba(87, 242, 135, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(87, 242, 135, 0.6);
        }

        .footer {
            background: rgba(32, 34, 37, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            color: #72767d;
            font-size: 14px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .footer p {
            position: relative;
            z-index: 1;
        }

        .footer::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #5865f2, #57f287, #faa61a, #9b59b6, #5865f2);
            background-size: 400% 400%;
            animation: footerGradient 6s ease-in-out infinite;
        }

        @keyframes footerGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .loading {
            text-align: center;
            padding: 80px;
            color: #fff;
        }

        .loading-spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #5865f2;
            border-right: 4px solid #57f287;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 20px auto;
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* تأثيرات متحركة إضافية */
        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .glow-text {
            animation: textGlow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container" id="transcript-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p style="font-size: 18px; margin-top: 20px; text-shadow: 0 0 10px rgba(88,101,242,0.5);">⏳ جاري تحميل بيانات التذكرة من El Omda Ticket...</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
    
        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('ar-EG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
    
        function getDuration(seconds) {
            if (!seconds) return 'غير محدد';
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (minutes > 0) return `${minutes} دقيقة و ${secs} ثانية`;
            return `${secs} ثانية`;
        }

        // دالة تحويل اللون الهكس إلى لون مقروء
        function hexToRgb(hex) {
            if (!hex) return null;
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(c => c + c).join('');
            }
            if (hex.length === 6) {
                const r = parseInt(hex.substring(0, 2), 16);
                const g = parseInt(hex.substring(2, 4), 16);
                const b = parseInt(hex.substring(4, 6), 16);
                return { r, g, b };
            }
            return null;
        }

        // دالة حساب تباين النص
        function getContrastColor(hexColor) {
            const rgb = hexToRgb(hexColor);
            if (!rgb) return '#ffffff';
            const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#ffffff';
        }

        // دالة معالجة ألوان الرتب
        function processRoleColors(ticketData) {
            const roleColors = {};
            
            if (ticketData.roleColors) {
                Object.assign(roleColors, ticketData.roleColors);
            }
            
            const defaultColors = {
                'ادارة': '#f04747',
                'admin': '#f04747',
                'owner': '#faa61a',
                'المالك': '#faa61a',
                'مدير': '#faa61a',
                'مطور': '#9b59b6',
                'developer': '#9b59b6',
                'دعم': '#43b581',
                'support': '#43b581',
                'حرامي': '#f04747',
                'harami': '#f04747',
                'مساعد': '#3498db',
                'helper': '#3498db',
                'عضو': '#95a5a6',
                'member': '#95a5a6',
                'vip': '#ff8c42',
                'مميز': '#ff8c42',
                'booster': '#ff7b9c',
                'داعم': '#ff7b9c'
            };
            
            if (ticketData.roles) {
                Object.keys(ticketData.roles).forEach(roleId => {
                    const roleName = ticketData.roles[roleId];
                    if (roleName && !roleColors[roleId]) {
                        const lowerName = roleName.toLowerCase();
                        for (const [key, color] of Object.entries(defaultColors)) {
                            if (lowerName.includes(key)) {
                                roleColors[roleId] = color;
                                break;
                            }
                        }
                    }
                });
            }
            
            return roleColors;
        }
    
        function renderTranscript(ticketData) {
            const container = document.getElementById('transcript-container');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            
            if (!ticketData) {
                container.innerHTML = '<div style="text-align:center;padding:80px;color:#f44336;font-size:18px;text-shadow:0 0 10px rgba(244,67,54,0.5);">❌ بيانات غير صالحة</div>';
                return;
            }
            
            const users = ticketData.users || {};
            const roles = ticketData.roles || {};
            const roleColors = processRoleColors(ticketData);
            
            let messagesHtml = '';
            
            // رسالة فتح التذكرة
            const openerName = users[ticketData.userId] || ticketData.userName || 'مستخدم';
            messagesHtml += `<div class="system-message"><strong>📌 تم فتح التذكرة</strong> بواسطة <strong>${openerName}</strong> في ${formatDate(ticketData.openedAt)}</div>`;
            
            // الأسئلة والأجوبة
            if (ticketData.answers) {
                const answers = ticketData.answers;
                const questions = ticketData.questions || {};
                
                messagesHtml += `
                    <div class="questions-section">
                        <div class="questions-title">
                            <div class="questions-title-icon">📝</div>
                            <div class="questions-title-text">إجابات الأسئلة</div>
                        </div>
                `;
                
                if (answers.answer1) {
                    messagesHtml += `
                        <div class="question-card">
                            <div style="display: flex; align-items: center; margin-bottom: 10px;">
                                <span class="question-number">١</span>
                                <span class="question-label">السؤال الأول</span>
                            </div>
                            <div class="question-text">${questions.required1 || 'ما سبب فتحك للتذكره'}</div>
                            <div class="answer-box">
                                <span class="answer-label">الإجابة</span>
                                <div class="answer-content">${answers.answer1}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (answers.answer2) {
                    messagesHtml += `
                        <div class="question-card">
                            <div style="display: flex; align-items: center; margin-bottom: 10px;">
                                <span class="question-number">٢</span>
                                <span class="question-label">السؤال الثاني</span>
                            </div>
                            <div class="question-text">${questions.required2 || 'الايدي الخاص بك دسكورد'}</div>
                            <div class="answer-box">
                                <span class="answer-label">الإجابة</span>
                                <div class="answer-content">${answers.answer2}</div>
                            </div>
                        </div>
                    `;
                }
                
                messagesHtml += `</div>`;
            }
    
            // باقي الرسائل
            if (ticketData.messages && ticketData.messages.length > 0) {
                ticketData.messages.forEach(msg => {
                    const isBot = msg.authorId === ticketData.botId;
                    const isSupport = ticketData.addedAdmins?.includes(msg.authorId) || msg.authorId === ticketData.claimedBy;
                    const authorClass = isBot ? 'bot' : (isSupport ? 'support' : '');
                    
                    const authorName = users[msg.authorId] || msg.author || msg.authorUsername || 'مستخدم';
                    
                    let displayContent = msg.content || '';
                    
                    // معالجة المنشنات
                    displayContent = displayContent.replace(/<@!?(\d+)>/g, (match, id) => {
                        const userName = users[id];
                        if (userName) {
                            return `<span class="user-mention" title="ID: ${id}">@${userName}</span>`;
                        }
                        return `<span class="user-mention" title="ID: ${id}">@مستخدم</span>`;
                    });
                    
                    displayContent = displayContent.replace(/<@&(\d+)>/g, (match, id) => {
                        const roleName = roles[id];
                        if (roleName) {
                            const bgColor = roleColors[id] || '#5865f2';
                            const textColor = getContrastColor(bgColor);
                            return `<span class="role-mention" style="background: ${bgColor}; color: ${textColor};" title="ID: ${id}">@${roleName}</span>`;
                        }
                        return match;
                    });
                    
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author ${authorClass}">${authorName} ${isBot ? '🤖' : ''}</span>
                                    <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                </div>
                                <div class="message-text">${displayContent}</div>
                    `;
                    
                    // الامبيدات
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            messagesHtml += `<div class="embed" style="border-right-color: ${embed.color || '#5865f2'}">`;
                            if (embed.title) messagesHtml += `<div class="embed-title">${embed.title}</div>`;
                            if (embed.description) messagesHtml += `<div class="embed-description">${embed.description}</div>`;
                            
                            if (embed.fields) {
                                embed.fields.forEach(field => {
                                    let fieldValue = field.value || '';
                                    
                                    fieldValue = fieldValue.replace(/<@!?(\d+)>/g, (m, id) => {
                                        const name = users[id];
                                        return name ? `@${name}` : m;
                                    }).replace(/<@&(\d+)>/g, (m, id) => {
                                        const roleName = roles[id];
                                        return roleName ? `@${roleName}` : m;
                                    });
                                    
                                    messagesHtml += `
                                        <div class="embed-field">
                                            <div class="embed-field-name">${field.name}</div>
                                            <div class="embed-field-value">${fieldValue}</div>
                                        </div>
                                    `;
                                });
                            }
                            
                            if (embed.image) messagesHtml += `<img class="embed-image" src="${embed.image}" loading="lazy">`;
                            messagesHtml += `</div>`;
                        });
                    }
                    
                    // المرفقات
                    if (msg.attachments && msg.attachments.length > 0) {
                        msg.attachments.forEach(att => {
                            messagesHtml += `<div style="margin-top:10px;"><a class="attachment-link" href="${att.url}" target="_blank" rel="noopener noreferrer">📎 ${att.name}</a></div>`;
                        });
                    }
                    
                    messagesHtml += `</div></div>`;
                });
            }
    
            // رسالة الاستلام
            if (ticketData.claimedByName && ticketData.claimedByName !== 'لم يتم الاستلام' && ticketData.claimedAt) {
                const claimerName = users[ticketData.claimedBy] || ticketData.claimedByName;
                messagesHtml += `<div class="system-message"><strong>✅ تم استلام التذكرة</strong> بواسطة <strong>${claimerName}</strong> في ${formatDate(ticketData.claimedAt)}</div>`;
            }
    
            // رسالة الإغلاق
            if (ticketData.closedAt) {
                const closerName = users[ticketData.closedBy] || ticketData.closedByName || 'غير معروف';
                messagesHtml += `<div class="system-message"><strong>🔒 تم إغلاق التذكرة</strong> بواسطة <strong>${closerName}</strong><br>📝 السبب: ${ticketData.closeReason || 'غير محدد'}<br>⏱️ المدة: ${getDuration(ticketData.duration)}</div>`;
            }
    
            // العرض النهائي
            const fullHtml = `
                <div class="header">
                    <h1>📋 نسخة التذكرة <span>${ticketData.fullId || ticketData.id || 'غير معروف'}</span></h1>
                    <div class="ticket-info">
                        <div><strong>👤</strong> ${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div>
                        <div><strong>📂</strong> ${ticketData.category || 'قسم غير محدد'}</div>
                        <div><strong>📅</strong> ${formatDate(ticketData.openedAt)}</div>
                        ${ticketData.closedAt ? `<div><strong>🔒</strong> ${formatDate(ticketData.closedAt)}</div>` : ''}
                    </div>
                </div>
    
                <div class="info-bar">
                    <div class="info-item"><div class="label">صاحب التذكرة</div><div class="value user">${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div></div>
                    <div class="info-item"><div class="label">القسم</div><div class="value">${ticketData.category || 'غير محدد'}</div></div>
                    <div class="info-item"><div class="label">المسؤول</div><div class="value">${users[ticketData.claimedBy] || ticketData.claimedByName || 'لم يتم الاستلام'}</div></div>
                    <div class="info-item"><div class="label">الحالة</div><div class="value">${ticketData.closedAt ? 'مغلقة' : 'مفتوحة'}</div></div>
                    <div class="info-item"><div class="label">إجمالي الرسائل</div><div class="value">${ticketData.messageCount || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات المستخدم</div><div class="value">${ticketData.userMentions || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات الدعم</div><div class="value">${ticketData.adminMentions || 0}</div></div>
                    <div class="info-item"><div class="label">الأداريين المضافين</div><div class="value">${ticketData.addedAdmins?.length || 0}</div></div>
                </div>
    
                <div class="chat-container">
                    ${messagesHtml}
                </div>
    
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn btn-success" onclick="downloadTranscript()">📥 تحميل HTML</button>
                </div>
    
                <div class="footer">
                    <p style="font-size: 16px; font-weight: 600; margin-bottom: 5px;">El Omda Ticket ⚡</p>
                    <p>تم إنشاء هذه النسخة في ${formatDate(Math.floor(Date.now() / 1000))}</p>
                    <p style="margin-top: 10px; font-size: 12px; opacity: 0.7;">جميع الحقوق محفوظة © 2026</p>
                </div>
            `;
    
            container.innerHTML = fullHtml;
        }
    
        function downloadTranscript() {
            const content = document.getElementById('transcript-container').innerHTML;
            const styles = document.querySelector('style').innerHTML;
            const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>نسخة التذكرة - El Omda Ticket</title><style>${styles}</style></head><body>${content}</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `elomda-ticket-${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    
        window.onload = async function() {
            const container = document.getElementById('transcript-container');
            const urlParam = getUrlParameter('url');
            const dataParam = getUrlParameter('data');
            
            try {
                if (urlParam) {
                    const response = await fetch(urlParam);
                    if (response.ok) {
                        const ticketData = await response.json();
                        renderTranscript(ticketData);
                        return;
                    }
                }
                
                if (dataParam) {
                    const ticketData = JSON.parse(decodeURIComponent(dataParam));
                    renderTranscript(ticketData);
                    return;
                }
                
                container.innerHTML = `<div class="system-message" style="padding:80px;">❌ لا توجد بيانات للتذكرة</div>`;
            } catch (error) {
                container.innerHTML = `<div class="system-message" style="padding:80px;color:#f44336;">❌ خطأ: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
