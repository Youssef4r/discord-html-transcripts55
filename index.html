<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 نسخة التذكرة - نظام التذاكر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #36393f;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2f3136;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: #202225;
            padding: 20px 30px;
            border-bottom: 1px solid #40444b;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header h1 span {
            background: #5865f2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 16px;
            margin-right: 10px;
        }

        .ticket-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: #b9bbbe;
            font-size: 14px;
        }

        .ticket-info div {
            background: #2f3136;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #40444b;
        }

        /* Info Bar */
        .info-bar {
            background: #2f3136;
            padding: 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #40444b;
        }

        .info-item {
            background: #202225;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .info-item .label {
            color: #72767d;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-item .value {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .info-item .value.user {
            color: #5865f2;
        }

        /* Chat Messages */
        .chat-container {
            padding: 20px 30px;
            background: #36393f;
        }

        .message-group {
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #40444b;
        }

        .message:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 15px;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .author {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .author.bot {
            color: #5865f2;
        }

        .author.support {
            color: #57f287;
        }

        .timestamp {
            color: #72767d;
            font-size: 12px;
        }

        .message-text {
            color: #dcddde;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Embeds */
        .embed {
            margin-top: 10px;
            background: #2f3136;
            border-left: 4px solid;
            border-radius: 4px;
            padding: 15px;
            max-width: 520px;
        }

        .embed-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .embed-description {
            color: #dcddde;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .embed-field {
            margin-top: 8px;
        }

        .embed-field-name {
            color: #b9bbbe;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 14px;
        }

        .embed-image {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 10px;
        }

        .embed-thumbnail {
            max-width: 80px;
            border-radius: 4px;
            margin-right: 15px;
            float: right;
        }

        .embed-footer {
            color: #72767d;
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .embed-footer-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        /* System Messages */
        .system-message {
            background: #2f3136;
            color: #b9bbbe;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            margin: 15px 0;
            border: 1px dashed #40444b;
        }

        .system-message strong {
            color: #fff;
        }

        /* Attachments */
        .attachment {
            margin-top: 8px;
        }

        .attachment-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 14px;
        }

        .attachment-link:hover {
            text-decoration: underline;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 20px 30px;
            background: #2f3136;
            border-top: 1px solid #40444b;
            justify-content: center;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-primary:hover {
            background: #4752c4;
        }

        .btn-success {
            background: #57f287;
            color: #2f3136;
        }

        .btn-success:hover {
            background: #46c572;
        }

        .btn-secondary {
            background: #4f545c;
            color: white;
        }

        .btn-secondary:hover {
            background: #3e434a;
        }

        /* Footer */
        .footer {
            background: #202225;
            padding: 15px 30px;
            color: #72767d;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #40444b;
        }
    </style>
</head>
<body>
    <div class="container" id="transcript-container">
        <!-- المحتوى هيتعبى هنا بالجافاسكريبت -->
    </div>

    <script>
        // دالة لجلب محتوى URL
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        // دالة لتنسيق التاريخ
        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('ar-SA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        // دالة لحساب المدة
        function getDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) return `${hours} ساعة ${minutes} دقيقة ${secs} ثانية`;
            if (minutes > 0) return `${minutes} دقيقة ${secs} ثانية`;
            return `${secs} ثانية`;
        }

        // تحميل البيانات
        window.onload = function() {
            const container = document.getElementById('transcript-container');
            const dataParam = getUrlParameter('data');
            
            if (!dataParam) {
                container.innerHTML = `
                    <div class="system-message" style="padding: 50px; text-align: center;">
                        ❌ لا توجد بيانات للتذكرة
                    </div>
                `;
                return;
            }

            try {
                const ticketData = JSON.parse(decodeURIComponent(dataParam));
                
                // بناء HTML التذكرة
                let messagesHtml = '';
                
                // رسالة فتح التذكرة
                messagesHtml += `
                    <div class="system-message">
                        <strong>📌 تم فتح التذكرة</strong> بواسطة <strong>${ticketData.userName}</strong> في ${formatDate(ticketData.openedAt)}
                    </div>
                `;
                
                // إجابات الأسئلة (كأول رسالة)
                if (ticketData.answers) {
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="User">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author">${ticketData.userName}</span>
                                    <span class="timestamp">${formatDate(ticketData.openedAt)}</span>
                                </div>
                                <div class="message-text">
                                    <strong>📝 إجابات الأسئلة:</strong>
                                    <br>❓ ${ticketData.questions?.required1 || 'السؤال 1'}: ${ticketData.answers.answer1 || 'لا يوجد'}
                                    <br>❓ ${ticketData.questions?.required2 || 'السؤال 2'}: ${ticketData.answers.answer2 || 'لا يوجد'}
                                    ${ticketData.answers.answer3 && ticketData.answers.answer3 !== 'لم يتم الإجابة' ? 
                                        `<br>❓ ${ticketData.questions?.optional1 || 'سؤال اختياري'}: ${ticketData.answers.answer3}` : ''}
                                    ${ticketData.answers.answer4 && ticketData.answers.answer4 !== 'لم يتم الإجابة' ? 
                                        `<br>❓ ${ticketData.questions?.optional2 || 'سؤال اختياري'}: ${ticketData.answers.answer4}` : ''}
                                    ${ticketData.answers.answer5 && ticketData.answers.answer5 !== 'لم يتم الإجابة' ? 
                                        `<br>❓ ${ticketData.questions?.optional3 || 'سؤال اختياري'}: ${ticketData.answers.answer5}` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }

                // رسائل المحادثة
                if (ticketData.messages && ticketData.messages.length > 0) {
                    ticketData.messages.forEach(msg => {
                        const isBot = msg.author?.includes('bot') || msg.authorId === ticketData.botId;
                        const isSupport = ticketData.addedAdmins?.includes(msg.authorId) || msg.authorId === ticketData.claimedBy;
                        
                        let authorClass = '';
                        if (isBot) authorClass = 'bot';
                        else if (isSupport) authorClass = 'support';
                        
                        messagesHtml += `
                            <div class="message">
                                <img class="avatar" src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar">
                                <div class="message-content">
                                    <div class="message-header">
                                        <span class="author ${authorClass}">${msg.author} ${isBot ? '🤖' : ''}</span>
                                        <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                    </div>
                                    <div class="message-text">${msg.content || ''}</div>
                        `;
                        
                        // إضافة الامبيدات
                        if (msg.embeds && msg.embeds.length > 0) {
                            msg.embeds.forEach(embed => {
                                messagesHtml += `
                                    <div class="embed" style="border-left-color: ${embed.color || '#5865f2'}">
                                        ${embed.title ? `<div class="embed-title">${embed.title}</div>` : ''}
                                        ${embed.description ? `<div class="embed-description">${embed.description}</div>` : ''}
                                `;
                                
                                if (embed.fields && embed.fields.length > 0) {
                                    embed.fields.forEach(field => {
                                        messagesHtml += `
                                            <div class="embed-field">
                                                <div class="embed-field-name">${field.name}</div>
                                                <div class="embed-field-value">${field.value}</div>
                                            </div>
                                        `;
                                    });
                                }
                                
                                if (embed.image) {
                                    messagesHtml += `<img class="embed-image" src="${embed.image}" alt="Embed Image">`;
                                }
                                
                                if (embed.footer) {
                                    messagesHtml += `
                                        <div class="embed-footer">
                                            ${embed.footer.icon ? `<img class="embed-footer-icon" src="${embed.footer.icon}">` : ''}
                                            ${embed.footer.text}
                                        </div>
                                    `;
                                }
                                
                                messagesHtml += `</div>`;
                            });
                        }
                        
                        // إضافة المرفقات
                        if (msg.attachments && msg.attachments.length > 0) {
                            msg.attachments.forEach(att => {
                                messagesHtml += `
                                    <div class="attachment">
                                        <a class="attachment-link" href="${att.url}" target="_blank">📎 ${att.name}</a>
                                    </div>
                                `;
                            });
                        }
                        
                        messagesHtml += `
                                </div>
                            </div>
                        `;
                    });
                }

                // رسالة استلام التذكرة
                if (ticketData.claimedByName) {
                    messagesHtml += `
                        <div class="system-message">
                            <strong>✅ تم استلام التذكرة</strong> بواسطة <strong>${ticketData.claimedByName}</strong> في ${formatDate(ticketData.claimedAt)}
                        </div>
                    `;
                }

                // رسالة إغلاق التذكرة
                if (ticketData.closedAt) {
                    messagesHtml += `
                        <div class="system-message">
                            <strong>🔒 تم إغلاق التذكرة</strong> بواسطة <strong>${ticketData.closedByName || 'غير معروف'}</strong>
                            <br>📝 السبب: ${ticketData.closeReason || 'غير محدد'}
                            <br>⏱️ مدة التذكرة: ${getDuration(ticketData.duration || 0)}
                        </div>
                    `;
                }

                // الإحصائيات
                const statsHtml = `
                    <div class="info-bar">
                        <div class="info-item">
                            <div class="label">إجمالي الرسائل</div>
                            <div class="value">${ticketData.messageCount || 0}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">استدعاءات المستخدم</div>
                            <div class="value">${ticketData.userMentions || 0}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">استدعاءات الدعم</div>
                            <div class="value">${ticketData.adminMentions || 0}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">الأداريين المضافين</div>
                            <div class="value">${ticketData.addedAdmins?.length || 0}</div>
                        </div>
                    </div>
                `;

                // تجميع كل حاجة
                const fullHtml = `
                    <div class="header">
                        <h1>📋 نسخة التذكرة <span>${ticketData.fullId || ticketData.id || 'غير معروف'}</span></h1>
                        <div class="ticket-info">
                            <div>👤 ${ticketData.userName}</div>
                            <div>📂 ${ticketData.category}</div>
                            <div>📅 ${formatDate(ticketData.openedAt)}</div>
                            ${ticketData.closedAt ? `<div>🔒 ${formatDate(ticketData.closedAt)}</div>` : ''}
                        </div>
                    </div>

                    <div class="info-bar">
                        <div class="info-item">
                            <div class="label">صاحب التذكرة</div>
                            <div class="value user">${ticketData.userName}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">القسم</div>
                            <div class="value">${ticketData.category}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">المسؤول</div>
                            <div class="value">${ticketData.claimedByName || 'لم يتم الاستلام'}</div>
                        </div>
                        <div class="info-item">
                            <div class="label">الحالة</div>
                            <div class="value">${ticketData.closedAt ? 'مغلقة' : 'مفتوحة'}</div>
                        </div>
                    </div>

                    <div class="chat-container">
                        ${messagesHtml}
                    </div>

                    ${statsHtml}

                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="window.print()">
                            🖨️ طباعة
                        </button>
                        <button class="btn btn-success" onclick="downloadTranscript()">
                            📥 تحميل
                        </button>
                        <button class="btn btn-secondary" onclick="window.close()">
                            🔒 إغلاق
                        </button>
                    </div>

                    <div class="footer">
                        <p>نظام تذاكر عائلة العمدة - تم إنشاء هذه النسخة في ${formatDate(Math.floor(Date.now() / 1000))}</p>
                    </div>
                `;

                container.innerHTML = fullHtml;

            } catch (error) {
                container.innerHTML = `
                    <div class="system-message" style="padding: 50px; text-align: center; color: #f44336;">
                        ❌ خطأ في تحميل بيانات التذكرة: ${error.message}
                    </div>
                `;
            }
        };

        // دالة تحميل الملف
        function downloadTranscript() {
            const content = document.getElementById('transcript-container').innerHTML;
            const style = document.querySelector('style').innerHTML;
            
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <style>${style}</style>
                </head>
                <body>
                    ${content}
                </body>
                </html>
            `;
            
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ticket-${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
