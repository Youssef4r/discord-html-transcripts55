<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف التذاكر - عائلة العمدة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 42px;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .header p {
            color: #666;
            font-size: 18px;
        }
        
        .ticket-link {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            border-right: 5px solid #667eea;
        }
        
        .ticket-link:hover {
            transform: translateX(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .ticket-info h3 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .ticket-info p {
            color: #666;
            font-size: 14px;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-preview {
            background: #667eea;
            color: white;
        }
        
        .btn-download {
            background: #48bb78;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .ticket-link {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏛️ أرشيف تذاكر عائلة العمدة</h1>
            <p>جميع نسخ محادثات التذاكر متاحة للمعاينة والتحميل</p>
        </div>

        <div id="tickets-list">
            <!-- هنا هتظهر التذاكر تلقائياً -->
        </div>

        <div class="footer">
            <p>نظام تذاكر متطور - جميع الحقوق محفوظة © 2024</p>
        </div>
    </div>

    <script>
        // جلب قائمة التذاكر من GitHub API
        async function loadTickets() {
            try {
                const response = await fetch('https://api.github.com/repos/YOUR_USERNAME/ticket-transcripts/contents/');
                const files = await response.json();
                
                const ticketsList = document.getElementById('tickets-list');
                ticketsList.innerHTML = '';
                
                // فلترة ملفات HTML فقط
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');
                
                if (htmlFiles.length === 0) {
                    ticketsList.innerHTML = '<div class="ticket-link" style="justify-content: center;">لا توجد تذاكر بعد</div>';
                    return;
                }
                
                // ترتيب من الأحدث للأقدم
                htmlFiles.sort((a, b) => new Date(b.name.match(/\d+/)?.[0] || 0) - new Date(a.name.match(/\d+/)?.[0] || 0));
                
                htmlFiles.forEach(file => {
                    const ticketId = file.name.replace('.html', '').replace('ticket-', '');
                    const date = new Date(parseInt(file.name.match(/\d+/)?.[0] || Date.now())).toLocaleString('ar-EG');
                    
                    const ticketElement = document.createElement('div');
                    ticketElement.className = 'ticket-link';
                    ticketElement.innerHTML = `
                        <div class="ticket-info">
                            <h3>🎫 ${ticketId}</h3>
                            <p>📅 ${date}</p>
                        </div>
                        <div class="buttons">
                            <a href="${file.download_url}" target="_blank" class="btn btn-preview">
                                <span>👁️</span> معاينة
                            </a>
                            <a href="${file.download_url}" download class="btn btn-download">
                                <span>📥</span> تحميل
                            </a>
                        </div>
                    `;
                    ticketsList.appendChild(ticketElement);
                });
            } catch (error) {
                console.error('خطأ في تحميل التذاكر:', error);
                document.getElementById('tickets-list').innerHTML = `
                    <div class="ticket-link" style="justify-content: center; color: red;">
                        ❌ حدث خطأ في تحميل التذاكر
                    </div>
                `;
            }
        }
        
        loadTickets();
    </script>
</body>
</html>
