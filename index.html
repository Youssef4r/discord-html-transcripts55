<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 نسخة التذكرة - نظام التذاكر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #36393f;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #2f3136;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #202225;
            padding: 20px 30px;
            border-bottom: 1px solid #40444b;
        }

        .header h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .header h1 span {
            background: #5865f2;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 16px;
            margin-right: 10px;
        }

        .ticket-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            color: #b9bbbe;
            font-size: 14px;
        }

        .ticket-info div {
            background: #2f3136;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #40444b;
        }

        .info-bar {
            background: #2f3136;
            padding: 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #40444b;
        }

        .info-item {
            background: #202225;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .info-item .label {
            color: #72767d;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-item .value {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .info-item .value.user {
            color: #5865f2;
        }

        .chat-container {
            padding: 20px 30px;
            background: #36393f;
        }

        .message {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #40444b;
        }

        .message:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 15px;
            flex-shrink: 0;
            object-fit: cover;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .author {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .author.bot {
            color: #5865f2;
        }

        .author.support {
            color: #57f287;
        }

        .timestamp {
            color: #72767d;
            font-size: 12px;
        }

        .message-text {
            color: #dcddde;
            font-size: 15px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-mention {
            background: #5865f2;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
        }
        
        .role-mention {
            background: #5865f2;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
            display: inline-block;
        }

        .embed {
            margin-top: 10px;
            background: #2f3136;
            border-left: 4px solid;
            border-radius: 4px;
            padding: 15px;
            max-width: 520px;
        }

        .embed-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .embed-description {
            color: #dcddde;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .embed-field {
            margin-top: 8px;
        }

        .embed-field-name {
            color: #b9bbbe;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 14px;
        }

        .embed-image {
            max-width: 100%;
            border-radius: 4px;
            margin-top: 10px;
        }

        .system-message {
            background: #2f3136;
            color: #b9bbbe;
            padding: 10px 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            margin: 15px 0;
            border: 1px dashed #40444b;
        }

        .system-message strong {
            color: #fff;
        }

        .attachment-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 14px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            padding: 20px 30px;
            background: #2f3136;
            border-top: 1px solid #40444b;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-primary:hover {
            background: #4752c4;
        }

        .btn-success {
            background: #57f287;
            color: #2f3136;
        }

        .btn-success:hover {
            background: #46c572;
        }

        .footer {
            background: #202225;
            padding: 15px 30px;
            color: #72767d;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #40444b;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #fff;
        }
        
        .loading-spinner {
            border: 4px solid #40444b;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="transcript-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>⏳ جاري تحميل بيانات التذكرة...</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
    
        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
    
        function getDuration(seconds) {
            if (!seconds) return 'غير محدد';
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (minutes > 0) return `${minutes} دقيقة ${secs} ثانية`;
            return `${secs} ثانية`;
        }
    
        function renderTranscript(ticketData) {
            const container = document.getElementById('transcript-container');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            
            if (!ticketData) {
                container.innerHTML = '<div style="text-align:center;padding:50px;color:#f44336;">❌ بيانات غير صالحة</div>';
                return;
            }
            
            const users = {};
            const roles = {};
            
            // إضافة المستخدمين الأساسيين
            if (ticketData.userId) users[ticketData.userId] = ticketData.userName || 'مستخدم';
            if (ticketData.claimedBy) users[ticketData.claimedBy] = ticketData.claimedByName || 'مسؤول';
            if (ticketData.closedBy) users[ticketData.closedBy] = ticketData.closedByName || 'مسؤول';
            
            // إضافة الرتب من البيانات
            if (ticketData.roles) {
                Object.assign(roles, ticketData.roles);
            }
            
            // إضافة المستخدمين الإضافيين
            if (ticketData.users) {
                Object.assign(users, ticketData.users);
            }
            
            // جمع المستخدمين والرتب من الرسائل
            if (ticketData.messages) {
                ticketData.messages.forEach(msg => {
                    if (msg.authorId && msg.author) users[msg.authorId] = msg.author;
                    
                    if (msg.content) {
                        // منشن المستخدمين
                        const userMatches = msg.content.match(/<@!?(\d+)>/g);
                        if (userMatches) {
                            userMatches.forEach(m => {
                                const id = m.replace(/<@!?|>/g, '');
                                if (!users[id]) users[id] = 'مستخدم';
                            });
                        }
                        
                        // منشن الرتب
                        const roleMatches = msg.content.match(/<@&(\d+)>/g);
                        if (roleMatches) {
                            roleMatches.forEach(m => {
                                const id = m.replace(/<@&|>/g, '');
                                if (!roles[id]) roles[id] = 'رتبة';
                            });
                        }
                    }
                });
            }
            
            let messagesHtml = '';
            
            // رسالة فتح التذكرة
            const openerName = users[ticketData.userId] || ticketData.userName || 'مستخدم';
            messagesHtml += `<div class="system-message"><strong>📌 تم فتح التذكرة</strong> بواسطة <strong>${openerName}</strong> في ${formatDate(ticketData.openedAt)}</div>`;
            
            // الأسئلة
            if (ticketData.answers) {
                const answers = ticketData.answers;
                const questions = ticketData.questions || {};
                
                let answersText = '';
                if (answers.answer1) answersText += `<strong>❓ ${questions.required1 || 'السؤال الأول'}:</strong> ${answers.answer1}<br>`;
                if (answers.answer2) answersText += `<strong>❓ ${questions.required2 || 'السؤال الثاني'}:</strong> ${answers.answer2}<br>`;
                if (answers.answer3 && answers.answer3 !== 'لم يتم الإجابة') answersText += `<strong>❓ ${questions.optional1 || 'سؤال اختياري'}:</strong> ${answers.answer3}<br>`;
                
                if (answersText) {
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="${ticketData.userAvatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author">${openerName}</span>
                                    <span class="timestamp">${formatDate(ticketData.openedAt)}</span>
                                </div>
                                <div class="message-text"><strong>📝 إجابات الأسئلة:</strong><br>${answersText}</div>
                            </div>
                        </div>
                    `;
                }
            }
    
            // الرسائل
            if (ticketData.messages && ticketData.messages.length > 0) {
                ticketData.messages.forEach(msg => {
                    const isBot = msg.authorId === ticketData.botId;
                    const isSupport = ticketData.addedAdmins?.includes(msg.authorId) || msg.authorId === ticketData.claimedBy;
                    const authorClass = isBot ? 'bot' : (isSupport ? 'support' : '');
                    const authorName = users[msg.authorId] || msg.author || 'مستخدم';
                    
                    // معالجة المحتوى
                    let displayContent = msg.content || '';
                    
                    // تحويل منشن المستخدمين
                    displayContent = displayContent.replace(/<@!?(\d+)>/g, (match, id) => {
                        const name = users[id];
                        return name ? `<span class="user-mention">@${name}</span>` : match;
                    });
                    
                    // تحويل منشن الرتب
                    displayContent = displayContent.replace(/<@&(\d+)>/g, (match, id) => {
                        const roleName = roles[id];
                        return roleName ? `<span class="role-mention">@${roleName}</span>` : match;
                    });
                    
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author ${authorClass}">${authorName} ${isBot ? '🤖' : ''}</span>
                                    <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                </div>
                                <div class="message-text">${displayContent}</div>
                    `;
                    
                    // الامبيدات
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            messagesHtml += `<div class="embed" style="border-left-color: ${embed.color || '#5865f2'}">`;
                            if (embed.title) messagesHtml += `<div class="embed-title">${embed.title}</div>`;
                            if (embed.description) messagesHtml += `<div class="embed-description">${embed.description}</div>`;
                            
                            if (embed.fields) {
                                embed.fields.forEach(field => {
                                    let fieldValue = field.value || '';
                                    fieldValue = fieldValue.replace(/<@!?(\d+)>/g, (m, id) => {
                                        const name = users[id];
                                        return name ? `@${name}` : m;
                                    }).replace(/<@&(\d+)>/g, (m, id) => {
                                        const roleName = roles[id];
                                        return roleName ? `@${roleName}` : m;
                                    });
                                    
                                    messagesHtml += `
                                        <div class="embed-field">
                                            <div class="embed-field-name">${field.name}</div>
                                            <div class="embed-field-value">${fieldValue}</div>
                                        </div>
                                    `;
                                });
                            }
                            
                            if (embed.image) messagesHtml += `<img class="embed-image" src="${embed.image}">`;
                            messagesHtml += `</div>`;
                        });
                    }
                    
                    // المرفقات
                    if (msg.attachments && msg.attachments.length > 0) {
                        msg.attachments.forEach(att => {
                            messagesHtml += `<div class="attachment"><a class="attachment-link" href="${att.url}" target="_blank">📎 ${att.name}</a></div>`;
                        });
                    }
                    
                    messagesHtml += `</div></div>`;
                });
            }
    
            // رسالة الاستلام
            if (ticketData.claimedByName && ticketData.claimedByName !== 'لم يتم الاستلام' && ticketData.claimedAt) {
                const claimerName = users[ticketData.claimedBy] || ticketData.claimedByName;
                messagesHtml += `<div class="system-message"><strong>✅ تم استلام التذكرة</strong> بواسطة <strong>${claimerName}</strong> في ${formatDate(ticketData.claimedAt)}</div>`;
            }
    
            // رسالة الإغلاق
            if (ticketData.closedAt) {
                const closerName = users[ticketData.closedBy] || ticketData.closedByName || 'غير معروف';
                messagesHtml += `<div class="system-message"><strong>🔒 تم إغلاق التذكرة</strong> بواسطة <strong>${closerName}</strong><br>📝 السبب: ${ticketData.closeReason || 'غير محدد'}<br>⏱️ المدة: ${getDuration(ticketData.duration)}</div>`;
            }
    
            // العرض النهائي
            const fullHtml = `
                <div class="header">
                    <h1>📋 نسخة التذكرة <span>${ticketData.fullId || ticketData.id || 'غير معروف'}</span></h1>
                    <div class="ticket-info">
                        <div>👤 ${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div>
                        <div>📂 ${ticketData.category || 'قسم غير محدد'}</div>
                        <div>📅 ${formatDate(ticketData.openedAt)}</div>
                        ${ticketData.closedAt ? `<div>🔒 ${formatDate(ticketData.closedAt)}</div>` : ''}
                    </div>
                </div>
    
                <div class="info-bar">
                    <div class="info-item"><div class="label">صاحب التذكرة</div><div class="value user">${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div></div>
                    <div class="info-item"><div class="label">القسم</div><div class="value">${ticketData.category || 'غير محدد'}</div></div>
                    <div class="info-item"><div class="label">المسؤول</div><div class="value">${users[ticketData.claimedBy] || ticketData.claimedByName || 'لم يتم الاستلام'}</div></div>
                    <div class="info-item"><div class="label">الحالة</div><div class="value">${ticketData.closedAt ? 'مغلقة' : 'مفتوحة'}</div></div>
                    <div class="info-item"><div class="label">إجمالي الرسائل</div><div class="value">${ticketData.messageCount || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات المستخدم</div><div class="value">${ticketData.userMentions || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات الدعم</div><div class="value">${ticketData.adminMentions || 0}</div></div>
                    <div class="info-item"><div class="label">الأداريين المضافين</div><div class="value">${ticketData.addedAdmins?.length || 0}</div></div>
                </div>
    
                <div class="chat-container">
                    ${messagesHtml}
                </div>
    
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn btn-success" onclick="downloadTranscript()">📥 تحميل</button>
                </div>
    
                <div class="footer"><p>نظام تذاكر عائلة العمدة - ${formatDate(Math.floor(Date.now() / 1000))}</p></div>
            `;
    
            container.innerHTML = fullHtml;
        }
    
        function downloadTranscript() {
            const content = document.getElementById('transcript-container').innerHTML;
            const styles = document.querySelector('style').innerHTML;
            const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>نسخة التذكرة</title><style>${styles}</style></head><body>${content}</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ticket-${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    
        window.onload = async function() {
            const container = document.getElementById('transcript-container');
            const urlParam = getUrlParameter('url');
            const dataParam = getUrlParameter('data');
            
            try {
                if (urlParam) {
                    const response = await fetch(urlParam);
                    if (response.ok) {
                        const ticketData = await response.json();
                        renderTranscript(ticketData);
                        return;
                    }
                }
                
                if (dataParam) {
                    const ticketData = JSON.parse(decodeURIComponent(dataParam));
                    renderTranscript(ticketData);
                    return;
                }
                
                container.innerHTML = `<div class="system-message" style="padding:50px;">❌ لا توجد بيانات للتذكرة</div>`;
            } catch (error) {
                container.innerHTML = `<div class="system-message" style="padding:50px;color:#f44336;">❌ خطأ: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
