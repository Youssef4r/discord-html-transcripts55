<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 El Omda Ticket - نسخة التذكرة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Cairo', Arial, sans-serif;
        }

        body {
            background: #1a1b1e;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #2f3136;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #40444b;
        }

        /* هيدر بسيط */
        .header {
            background: #202225;
            padding: 25px 30px;
            border-bottom: 2px solid #5865f2;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            background: #5865f2;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 15px;
        }

        .ticket-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .ticket-info div {
            background: #2f3136;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #40444b;
            color: #b9bbbe;
            font-size: 14px;
        }

        .ticket-info div strong {
            color: #fff;
            margin-left: 5px;
        }

        /* شريط المعلومات */
        .info-bar {
            background: #2f3136;
            padding: 20px 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            border-bottom: 1px solid #40444b;
        }

        .info-item {
            background: #202225;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #40444b;
        }

        .info-item .label {
            color: #72767d;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .info-item .value {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
        }

        .info-item .value.user {
            color: #5865f2;
        }

        /* التذكرة الجديدة - نسخة خفيفة */
        .ticket-header {
            background: linear-gradient(to bottom, #202225, #2a2c30);
            border-radius: 16px;
            padding: 20px;
            margin: 15px 20px 25px 20px;
            border: 1px solid #40444b;
            border-top: 3px solid #5865f2;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .ticket-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #40444b;
        }

        .ticket-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ticket-icon {
            background: #5865f2;
            width: 45px;
            height: 45px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .ticket-id {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
        }

        .ticket-code {
            color: #5865f2;
            font-size: 12px;
            margin-top: 2px;
        }

        .ticket-status {
            background: #2f3136;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #57f287;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #57f287;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .ticket-status span {
            color: #57f287;
            font-weight: 600;
            font-size: 13px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .info-card {
            background: #2f3136;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #40444b;
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .info-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .info-label {
            color: #b9bbbe;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .info-value {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding-right: 36px;
        }

        .user-badge, .staff-badge, .mention-badge {
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            font-size: 13px;
        }

        .user-badge {
            background: #5865f2;
        }

        .staff-badge {
            background: #57f287;
            color: #2f3136;
            font-weight: 700;
            margin-left: 6px;
        }

        .staff-name {
            color: #b9bbbe;
            font-size: 12px;
        }

        .dates-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .date-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .date-label {
            color: #b9bbbe;
            font-size: 11px;
            min-width: 40px;
        }

        .date-value {
            color: #fff;
            font-size: 11px;
            font-weight: 600;
        }

        .mentions-container {
            background: #202225;
            border-radius: 30px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid #40444b;
        }

        .mentions-label {
            color: #b9bbbe;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .mentions-list {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mention-badge {
            background: #5865f2;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
        }

        /* منطقة المحادثة */
        .chat-container {
            padding: 20px 25px;
            background: #36393f;
        }

        .message {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #40444b;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-left: 15px;
            flex-shrink: 0;
            object-fit: cover;
            border: 2px solid #40444b;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }

        .author {
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }

        .author.bot {
            color: #5865f2;
        }

        .author.support {
            color: #57f287;
        }

        .timestamp {
            color: #72767d;
            font-size: 11px;
            background: #202225;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .message-text {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* تنسيق المنشنات */
        .user-mention {
            background: #5865f2;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            font-size: 13px;
            margin: 2px 3px;
        }
        
        .role-mention {
            color: white;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin: 2px 3px;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* الأسئلة والأجوبة */
        .questions-section {
            background: #202225;
            border-radius: 14px;
            padding: 18px;
            margin: 15px 0;
            border-right: 4px solid #5865f2;
        }

        .questions-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #40444b;
        }

        .questions-title-icon {
            background: #5865f2;
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .questions-title-text {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
        }

        .question-card {
            background: #2f3136;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #40444b;
        }

        .question-number {
            background: #5865f2;
            color: white;
            width: 25px;
            height: 25px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            margin-left: 8px;
        }

        .question-label {
            color: #b9bbbe;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .question-text {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            padding-right: 33px;
        }

        .answer-box {
            background: #202225;
            border-radius: 10px;
            padding: 12px 15px;
            margin-right: 33px;
            border-right: 3px solid #57f287;
            position: relative;
        }

        .answer-label {
            position: absolute;
            top: -8px;
            right: 10px;
            background: #202225;
            color: #57f287;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid #40444b;
        }

        .answer-content {
            color: #dcddde;
            font-size: 14px;
            line-height: 1.5;
        }

        /* الامبيدات */
        .embed {
            margin-top: 12px;
            background: #2f3136;
            border-right: 4px solid;
            border-radius: 8px;
            padding: 12px 15px;
            max-width: 500px;
        }

        .embed-title {
            color: #fff;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .embed-description {
            color: #dcddde;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .embed-field {
            margin-top: 8px;
        }

        .embed-field-name {
            color: #b9bbbe;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 13px;
        }

        .embed-image {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 10px;
        }

        /* الرسائل النظامية */
        .system-message {
            background: #2f3136;
            color: #b9bbbe;
            padding: 12px 20px;
            border-radius: 30px;
            text-align: center;
            font-size: 13px;
            margin: 15px 0;
            border: 1px dashed #5865f2;
        }

        .system-message strong {
            color: #fff;
        }

        /* المرفقات */
        .attachment-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 15px;
            background: #202225;
            border-radius: 30px;
            margin: 4px 0;
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 12px;
            padding: 20px 25px;
            background: #2f3136;
            border-top: 1px solid #40444b;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 30px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-primary:hover {
            background: #4752c4;
        }

        .btn-success {
            background: #57f287;
            color: #2f3136;
        }

        .btn-success:hover {
            background: #46c572;
        }

        .footer {
            background: #202225;
            padding: 15px 25px;
            color: #72767d;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #40444b;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #fff;
        }

        .loading-spinner {
            border: 3px solid #40444b;
            border-top: 3px solid #5865f2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* للشاشات الصغيرة */
        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
            }
            
            .ticket-title-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="transcript-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>⏳ جاري تحميل بيانات التذكرة...</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
    
        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('ar-EG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
    
        function getDuration(seconds) {
            if (!seconds) return 'غير محدد';
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (minutes > 0) return `${minutes} دقيقة و ${secs} ثانية`;
            return `${secs} ثانية`;
        }

        function hexToRgb(hex) {
            if (!hex) return null;
            hex = hex.replace('#', '');
            if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
            if (hex.length === 6) {
                const r = parseInt(hex.substring(0, 2), 16);
                const g = parseInt(hex.substring(2, 4), 16);
                const b = parseInt(hex.substring(4, 6), 16);
                return { r, g, b };
            }
            return null;
        }

        function getContrastColor(hexColor) {
            const rgb = hexToRgb(hexColor);
            if (!rgb) return '#ffffff';
            const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#ffffff';
        }

        function processRoleColors(ticketData) {
            const roleColors = {};
            if (ticketData.roleColors) Object.assign(roleColors, ticketData.roleColors);
            
            const defaultColors = {
                'ادارة': '#f04747', 'admin': '#f04747', 'owner': '#faa61a',
                'المالك': '#faa61a', 'مدير': '#faa61a', 'مطور': '#9b59b6',
                'developer': '#9b59b6', 'دعم': '#43b581', 'support': '#43b581',
                'حرامي': '#f04747', 'harami': '#f04747', 'مساعد': '#3498db',
                'helper': '#3498db', 'عضو': '#95a5a6', 'member': '#95a5a6',
                'vip': '#ff8c42', 'مميز': '#ff8c42', 'booster': '#ff7b9c'
            };
            
            if (ticketData.roles) {
                Object.keys(ticketData.roles).forEach(roleId => {
                    const roleName = ticketData.roles[roleId];
                    if (roleName && !roleColors[roleId]) {
                        const lowerName = roleName.toLowerCase();
                        for (const [key, color] of Object.entries(defaultColors)) {
                            if (lowerName.includes(key)) {
                                roleColors[roleId] = color;
                                break;
                            }
                        }
                    }
                });
            }
            return roleColors;
        }
    
        function renderTranscript(ticketData) {
            const container = document.getElementById('transcript-container');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            
            if (!ticketData) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:#f44336;">❌ بيانات غير صالحة</div>';
                return;
            }
            
            const users = ticketData.users || {};
            const roles = ticketData.roles || {};
            const roleColors = processRoleColors(ticketData);
            
            let messagesHtml = '';
            
            // رسالة فتح التذكرة
            const openerName = users[ticketData.userId] || ticketData.userName || 'مستخدم';
            messagesHtml += `<div class="system-message"><strong>📌 تم فتح التذكرة</strong> بواسطة <strong>${openerName}</strong> في ${formatDate(ticketData.openedAt)}</div>`;
            
            // الأسئلة والأجوبة
            if (ticketData.answers) {
                const answers = ticketData.answers;
                const questions = ticketData.questions || {};
                
                let questionsHtml = '<div class="questions-section"><div class="questions-title"><span class="questions-title-icon">📝</span><span class="questions-title-text">إجابات الأسئلة</span></div>';
                
                if (answers.answer1) {
                    questionsHtml += `
                        <div class="question-card">
                            <div class="question-label"><span class="question-number">١</span> السؤال الأول</div>
                            <div class="question-text">${questions.required1 || 'ما سبب فتحك للتذكره'}</div>
                            <div class="answer-box">
                                <span class="answer-label">الإجابة</span>
                                <div class="answer-content">${answers.answer1}</div>
                            </div>
                        </div>
                    `;
                }
                
                if (answers.answer2) {
                    questionsHtml += `
                        <div class="question-card">
                            <div class="question-label"><span class="question-number">٢</span> السؤال الثاني</div>
                            <div class="question-text">${questions.required2 || 'الايدي الخاص بك دسكورد'}</div>
                            <div class="answer-box">
                                <span class="answer-label">الإجابة</span>
                                <div class="answer-content">${answers.answer2}</div>
                            </div>
                        </div>
                    `;
                }
                
                questionsHtml += '</div>';
                messagesHtml += questionsHtml;
            }
    
            // باقي الرسائل
            if (ticketData.messages && ticketData.messages.length > 0) {
                ticketData.messages.forEach(msg => {
                    const isBot = msg.authorId === ticketData.botId;
                    const isSupport = ticketData.addedAdmins?.includes(msg.authorId) || msg.authorId === ticketData.claimedBy;
                    const authorClass = isBot ? 'bot' : (isSupport ? 'support' : '');
                    
                    const authorName = users[msg.authorId] || msg.author || msg.authorUsername || 'مستخدم';
                    
                    let displayContent = msg.content || '';
                    
                    displayContent = displayContent.replace(/<@!?(\d+)>/g, (match, id) => {
                        const userName = users[id];
                        return userName ? `<span class="user-mention">@${userName}</span>` : match;
                    });
                    
                    displayContent = displayContent.replace(/<@&(\d+)>/g, (match, id) => {
                        const roleName = roles[id];
                        if (roleName) {
                            const bgColor = roleColors[id] || '#5865f2';
                            const textColor = getContrastColor(bgColor);
                            return `<span class="role-mention" style="background: ${bgColor}; color: ${textColor};">@${roleName}</span>`;
                        }
                        return match;
                    });
                    
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author ${authorClass}">${authorName} ${isBot ? '🤖' : ''}</span>
                                    <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                </div>
                                <div class="message-text">${displayContent}</div>
                    `;
                    
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            messagesHtml += `<div class="embed" style="border-right-color: ${embed.color || '#5865f2'}">`;
                            if (embed.title) messagesHtml += `<div class="embed-title">${embed.title}</div>`;
                            if (embed.description) messagesHtml += `<div class="embed-description">${embed.description}</div>`;
                            
                            if (embed.fields) {
                                embed.fields.forEach(field => {
                                    let fieldValue = field.value || '';
                                    fieldValue = fieldValue.replace(/<@!?(\d+)>/g, (m, id) => {
                                        const name = users[id];
                                        return name ? `@${name}` : m;
                                    }).replace(/<@&(\d+)>/g, (m, id) => {
                                        const roleName = roles[id];
                                        return roleName ? `@${roleName}` : m;
                                    });
                                    
                                    messagesHtml += `
                                        <div class="embed-field">
                                            <div class="embed-field-name">${field.name}</div>
                                            <div class="embed-field-value">${fieldValue}</div>
                                        </div>
                                    `;
                                });
                            }
                            
                            if (embed.image) messagesHtml += `<img class="embed-image" src="${embed.image}" loading="lazy">`;
                            messagesHtml += `</div>`;
                        });
                    }
                    
                    if (msg.attachments && msg.attachments.length > 0) {
                        msg.attachments.forEach(att => {
                            messagesHtml += `<div><a class="attachment-link" href="${att.url}" target="_blank">📎 ${att.name}</a></div>`;
                        });
                    }
                    
                    messagesHtml += `</div></div>`;
                });
            }
    
            if (ticketData.claimedByName && ticketData.claimedByName !== 'لم يتم الاستلام' && ticketData.claimedAt) {
                const claimerName = users[ticketData.claimedBy] || ticketData.claimedByName;
                messagesHtml += `<div class="system-message"><strong>✅ تم استلام التذكرة</strong> بواسطة <strong>${claimerName}</strong> في ${formatDate(ticketData.claimedAt)}</div>`;
            }
    
            if (ticketData.closedAt) {
                const closerName = users[ticketData.closedBy] || ticketData.closedByName || 'غير معروف';
                messagesHtml += `<div class="system-message"><strong>🔒 تم إغلاق التذكرة</strong> بواسطة <strong>${closerName}</strong><br>📝 السبب: ${ticketData.closeReason || 'غير محدد'}<br>⏱️ المدة: ${getDuration(ticketData.duration)}</div>`;
            }
    
            const fullHtml = `
                <div class="header">
                    <h1>📋 El Omda Ticket <span>${ticketData.fullId || ticketData.id || 'غير معروف'}</span></h1>
                    <div class="ticket-info">
                        <div><strong>👤</strong> ${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div>
                        <div><strong>📂</strong> ${ticketData.category || 'قسم غير محدد'}</div>
                        <div><strong>📅</strong> ${formatDate(ticketData.openedAt)}</div>
                        ${ticketData.closedAt ? `<div><strong>🔒</strong> ${formatDate(ticketData.closedAt)}</div>` : ''}
                    </div>
                </div>
    
                <div class="info-bar">
                    <div class="info-item"><div class="label">صاحب التذكرة</div><div class="value user">${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div></div>
                    <div class="info-item"><div class="label">القسم</div><div class="value">${ticketData.category || 'غير محدد'}</div></div>
                    <div class="info-item"><div class="label">المسؤول</div><div class="value">${users[ticketData.claimedBy] || ticketData.claimedByName || 'لم يتم الاستلام'}</div></div>
                    <div class="info-item"><div class="label">الحالة</div><div class="value">${ticketData.closedAt ? 'مغلقة' : 'مفتوحة'}</div></div>
                    <div class="info-item"><div class="label">الرسائل</div><div class="value">${ticketData.messageCount || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات</div><div class="value">${ticketData.userMentions || 0}</div></div>
                </div>
    
                <!-- ⭐⭐⭐ الجزء العلوي من التذكرة -->
                <div class="ticket-header">
                    <div class="ticket-title-row">
                        <div class="ticket-title">
                            <span class="ticket-icon">🎫</span>
                            <div>
                                <div class="ticket-id">${ticketData.fullId || 'دعم فني'}</div>
                                <div class="ticket-code">#${ticketData.id || 'ticket'}</div>
                            </div>
                        </div>
                        <div class="ticket-status">
                            <span class="status-dot"></span>
                            <span>${ticketData.claimedBy ? '✅ مستلمة' : '⏳ في الانتظار'}</span>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-card-header">
                                <span class="info-icon" style="background: #5865f2;">👤</span>
                                <span class="info-label">صاحب التذكرة</span>
                            </div>
                            <div class="info-value">
                                <span class="user-badge">@${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</span>
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-card-header">
                                <span class="info-icon" style="background: #faa61a;">📂</span>
                                <span class="info-label">القسم</span>
                            </div>
                            <div class="info-value">${ticketData.category || 'دعم فني'}</div>
                        </div>

                        <div class="info-card">
                            <div class="info-card-header">
                                <span class="info-icon" style="background: #57f287;">👨‍💼</span>
                                <span class="info-label">المسؤول</span>
                            </div>
                            <div class="info-value">
                                <span class="staff-badge">@${users[ticketData.claimedBy] || ticketData.claimedByName || 'لم يستلم'}</span>
                                ${ticketData.claimedBy ? `<span class="staff-name">(${ticketData.claimedByName})</span>` : ''}
                            </div>
                        </div>

                        <div class="info-card">
                            <div class="info-card-header">
                                <span class="info-icon" style="background: #9b59b6;">📅</span>
                                <span class="info-label">التواريخ</span>
                            </div>
                            <div class="dates-container">
                                <div class="date-item">
                                    <span class="date-label">الفتح:</span>
                                    <span class="date-value">${formatDate(ticketData.openedAt)}</span>
                                </div>
                                <div class="date-item">
                                    <span class="date-label">الاستلام:</span>
                                    <span class="date-value">${ticketData.claimedAt ? formatDate(ticketData.claimedAt) : 'لم يستلم'}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mentions-container">
                        <span class="mentions-label">المستلمون:</span>
                        <div class="mentions-list">
                            ${ticketData.claimedBy ? `<span class="mention-badge" style="background: #5865f2;">@${users[ticketData.claimedBy] || 'مستخدم'}</span>` : ''}
                            ${ticketData.category ? `<span class="mention-badge" style="background: #faa61a; color: #2f3136;">@${ticketData.category}</span>` : ''}
                        </div>
                    </div>
                </div>
    
                <div class="chat-container">
                    ${messagesHtml}
                </div>
    
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn btn-success" onclick="downloadTranscript()">📥 تحميل</button>
                </div>
    
                <div class="footer">
                    <p>El Omda Ticket • ${formatDate(Math.floor(Date.now() / 1000))}</p>
                </div>
            `;
    
            container.innerHTML = fullHtml;
        }
    
        function downloadTranscript() {
            const content = document.getElementById('transcript-container').innerHTML;
            const styles = document.querySelector('style').innerHTML;
            const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>El Omda Ticket</title><style>${styles}</style></head><body>${content}</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `elomda-ticket-${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    
        window.onload = async function() {
            const container = document.getElementById('transcript-container');
            const urlParam = getUrlParameter('url');
            const dataParam = getUrlParameter('data');
            
            try {
                if (urlParam) {
                    const response = await fetch(urlParam);
                    if (response.ok) {
                        const ticketData = await response.json();
                        renderTranscript(ticketData);
                        return;
                    }
                }
                
                if (dataParam) {
                    const ticketData = JSON.parse(decodeURIComponent(dataParam));
                    renderTranscript(ticketData);
                    return;
                }
                
                container.innerHTML = '<div class="system-message" style="padding:50px;">❌ لا توجد بيانات للتذكرة</div>';
            } catch (error) {
                container.innerHTML = `<div class="system-message" style="padding:50px;color:#f44336;">❌ خطأ: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
