<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 نسخة التذكرة - نظام التذاكر المطور</title>
    <style>
        /* التنسيقات الأساسية المستوحاة من ديسكورد */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
        }

        body { background: #36393f; min-height: 100vh; padding: 20px; color: #dcddde; }

        .container {
            max-width: 1000px; margin: 0 auto;
            background: #2f3136; border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); overflow: hidden;
        }

        .header {
            background: #202225; padding: 25px;
            border-bottom: 1px solid #40444b;
        }

        .header h1 { color: #fff; font-size: 22px; display: flex; align-items: center; gap: 10px; }
        .header h1 span { background: #5865f2; padding: 2px 10px; border-radius: 4px; font-size: 14px; }

        .ticket-info { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .ticket-info div { background: #2f3136; padding: 5px 12px; border-radius: 4px; font-size: 13px; border: 1px solid #40444b; }

        .info-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; padding: 20px; background: #2f3136; border-bottom: 1px solid #40444b;
        }

        .info-item { background: #202225; padding: 10px; border-radius: 6px; }
        .info-item .label { color: #72767d; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }
        .info-item .value { color: #fff; font-weight: 500; font-size: 14px; }

        .chat-container { padding: 20px; background: #36393f; }

        .message { display: flex; padding: 15px 5px; margin: 5px 0; transition: background 0.2s; }
        .message:hover { background: rgba(4, 4, 5, 0.07); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; margin-left: 15px; flex-shrink: 0; }

        .message-content { flex: 1; min-width: 0; }
        .message-header { margin-bottom: 4px; }
        .author { color: #fff; font-weight: 500; margin-left: 8px; }
        .author.bot-tag { background: #5865f2; color: white; font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-right: 5px; }
        .timestamp { color: #72767d; font-size: 12px; }

        .message-text { font-size: 15px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }

        /* تجميل المنشنات */
        .mention {
            background: rgba(88, 101, 242, 0.3);
            color: #dee0fc;
            padding: 0 4px; border-radius: 3px;
            font-weight: 500; cursor: pointer;
        }
        .mention:hover { background: #5865f2; color: #fff; }

        .embed {
            margin-top: 8px; padding: 12px;
            border-left: 4px solid #1e1f22; background: #2b2d31;
            border-radius: 4px; max-width: 520px;
        }

        .system-message {
            text-align: center; margin: 20px 0; color: #b9bbbe;
            border-top: 1px solid #40444b; padding-top: 10px; font-size: 13px;
        }

        .action-buttons { padding: 20px; text-align: center; background: #2f3136; }
        .btn {
            padding: 10px 25px; border-radius: 3px; border: none;
            cursor: pointer; font-weight: bold; margin: 0 5px;
        }
        .btn-print { background: #4e5058; color: white; }
        .btn-save { background: #248046; color: white; }

        @media print { .action-buttons { display: none; } }
    </style>
</head>
<body>
    <div id="transcript-container" class="container">
        <div style="padding: 50px; text-align: center;">⏳ جاري معالجة بيانات التذكرة...</div>
    </div>

    <script>
        function formatDate(ts) {
            if (!ts) return "غير معروف";
            const date = new Date(ts * 1000);
            return date.toLocaleString('ar-EG', { dateStyle: 'long', timeStyle: 'short' });
        }

        function parseContent(content, users = {}, roles = {}) {
            if (!content) return "";
            
            // تنظيف النص من أكواد HTML لمنع الـ XSS
            let safeContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

            // 1. منشن المستخدمين <@ID> أو <@!ID>
            safeContent = safeContent.replace(/&lt;@!?(\d+)&gt;/g, (match, id) => {
                const name = users[id] || id;
                return `<span class="mention">@${name}</span>`;
            });

            // 2. منشن الرتب <@&ID>
            safeContent = safeContent.replace(/&lt;@&amp;(\d+)&gt;/g, (match, id) => {
                const roleName = roles[id] || `رتبة-${id}`;
                return `<span class="mention">@${roleName}</span>`;
            });

            // 3. منشن القنوات <#ID>
            safeContent = safeContent.replace(/&lt;#(\d+)&gt;/g, (match, id) => {
                return `<span class="mention">#قناة-${id}</span>`;
            });

            return safeContent;
        }

        function renderTranscript(data) {
            const container = document.getElementById('transcript-container');
            const users = data.users || {};
            const roles = data.roles || {};

            let html = `
                <div class="header">
                    <h1><span>تذكرة</span> ${data.id || 'بدون عنوان'}</h1>
                    <div class="ticket-info">
                        <div>👤 العميل: ${users[data.userId] || data.userName || 'غير معروف'}</div>
                        <div>📁 القسم: ${data.category || 'عام'}</div>
                        <div>⏰ فتحت في: ${formatDate(data.openedAt)}</div>
                    </div>
                </div>

                <div class="info-bar">
                    <div class="info-item"><div class="label">الحالة</div><div class="value">${data.closedAt ? 'مغلقة' : 'مفتوحة'}</div></div>
                    <div class="info-item"><div class="label">الرسائل</div><div class="value">${data.messages?.length || 0}</div></div>
                    <div class="info-item"><div class="label">المستلم</div><div class="value">${users[data.claimedBy] || 'لم تستلم'}</div></div>
                </div>

                <div class="chat-container">`;

            if (data.messages) {
                data.messages.forEach(msg => {
                    const authorName = users[msg.authorId] || msg.author || "مستخدم غير معروف";
                    const isBot = msg.bot || false;

                    html += `
                        <div class="message">
                            <img src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" class="avatar">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author">${authorName}</span>
                                    ${isBot ? '<span class="author bot-tag">بوت</span>' : ''}
                                    <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                </div>
                                <div class="message-text">${parseContent(msg.content, users, roles)}</div>`;

                    // عرض المرفقات (صور)
                    if (msg.attachments) {
                        msg.attachments.forEach(att => {
                            if (att.url.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                                html += `<img src="${att.url}" style="max-width: 100%; border-radius: 8px; margin-top: 10px; max-height: 400px;">`;
                            } else {
                                html += `<div style="margin-top:10px;"><a href="${att.url}" target="_blank" style="color:#5865f2;">📎 ملف مرفق: ${att.name}</a></div>`;
                            }
                        });
                    }

                    // عرض الـ Embeds
                    if (msg.embeds) {
                        msg.embeds.forEach(embed => {
                            html += `
                                <div class="embed" style="border-left-color: ${embed.color || '#1e1f22'}">
                                    ${embed.title ? `<div style="font-weight:bold; margin-bottom:5px;">${embed.title}</div>` : ''}
                                    ${embed.description ? `<div style="font-size:14px;">${parseContent(embed.description, users, roles)}</div>` : ''}
                                </div>`;
                        });
                    }

                    html += `</div></div>`;
                });
            }

            html += `</div>
                <div class="action-buttons">
                    <button class="btn btn-print" onclick="window.print()">🖨️ طباعة التذكرة</button>
                    <button class="btn btn-save" onclick="location.reload()">🔄 تحديث البيانات</button>
                </div>
                <div style="text-align:center; padding: 20px; color:#72767d; font-size:12px;">نظام تذاكر عائلة العمدة © 2026</div>`;

            container.innerHTML = html;
        }

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const dataUrl = urlParams.get('url');
            const rawData = urlParams.get('data');

            try {
                let ticketData;
                if (dataUrl) {
                    const res = await fetch(dataUrl);
                    ticketData = await res.json();
                } else if (rawData) {
                    ticketData = JSON.parse(decodeURIComponent(rawData));
                }

                if (ticketData) {
                    renderTranscript(ticketData);
                } else {
                    document.getElementById('transcript-container').innerHTML = "❌ لم يتم العثور على بيانات للتذكرة.";
                }
            } catch (e) {
                document.getElementById('transcript-container').innerHTML = "❌ حدث خطأ أثناء تحميل البيانات: " + e.message;
            }
        };
    </script>
</body>
</html>
