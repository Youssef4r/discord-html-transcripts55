<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 نسخة التذكرة - El Omda Ticket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', 'Cairo', Arial, sans-serif;
        }

        body {
            background: #1a1b1e;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #2f3136;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid #40444b;
        }

        /* الهيدر */
        .header {
            background: linear-gradient(145deg, #202225 0%, #2a2c30 100%);
            padding: 30px 35px;
            border-bottom: 3px solid #5865f2;
        }

        .header h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 span {
            background: #5865f2;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
        }

        .ticket-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .ticket-info div {
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #40444b;
            color: #b9bbbe;
            font-size: 15px;
        }

        .ticket-info div strong {
            color: #fff;
            margin-left: 5px;
        }

        /* شريط المعلومات */
        .info-bar {
            background: #2f3136;
            padding: 25px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            border-bottom: 1px solid #40444b;
        }

        .info-item {
            background: #202225;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #40444b;
        }

        .info-item .label {
            color: #72767d;
            font-size: 13px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .info-item .value {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .info-item .value.user {
            color: #5865f2;
        }

        /* منطقة المحادثة */
        .chat-container {
            padding: 25px 30px;
            background: #36393f;
        }

        /* كل رسالة */
        .message {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #40444b;
            margin-bottom: 5px;
        }

        .message:last-child {
            border-bottom: none;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-left: 20px;
            flex-shrink: 0;
            object-fit: cover;
            border: 2px solid #40444b;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .author {
            color: #fff;
            font-weight: 700;
            font-size: 18px;
        }

        .author.bot {
            color: #5865f2;
        }

        .author.support {
            color: #57f287;
        }

        .timestamp {
            color: #72767d;
            font-size: 13px;
            background: rgba(0,0,0,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .message-text {
            color: #dcddde;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 5px 0;
        }

        /* تنسيق الأسئلة والأجوبة */
        .questions-box {
            background: #202225;
            border-radius: 12px;
            padding: 20px;
            margin: 10px 0 15px 0;
            border: 1px solid #40444b;
            border-right: 4px solid #5865f2;
        }

        .question-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #40444b;
        }

        .question-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .question-label {
            color: #b9bbbe;
            font-size: 14px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-label i {
            color: #5865f2;
            font-style: normal;
            font-size: 16px;
        }

        .question-answer {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            background: #2f3136;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 5px;
            border: 1px solid #40444b;
        }

        /* ⭐⭐⭐ تنسيق المنشنات والرتب - الأهم هنا */
        .user-mention {
            background: #5865f2;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            font-size: 0.95em;
            margin: 2px 4px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .role-mention {
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-weight: 600;
            display: inline-block;
            margin: 2px 4px;
            font-size: 0.95em;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        /* ألوان الرتب حسب النوع - هنطبقها مباشرة من البيانات */
        .role-mention[data-color] {
            background-color: attr(data-color color);
        }

        /* الامبيدات */
        .embed {
            margin-top: 15px;
            background: #2f3136;
            border-right: 4px solid;
            border-radius: 8px;
            padding: 15px 20px;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .embed-title {
            color: #fff;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .embed-description {
            color: #dcddde;
            font-size: 15px;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .embed-field {
            margin-top: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #40444b;
        }

        .embed-field-name {
            color: #b9bbbe;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 15px;
            line-height: 1.6;
        }

        .embed-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 15px;
            border: 2px solid #40444b;
        }

        /* الرسائل النظامية */
        .system-message {
            background: #2f3136;
            color: #b9bbbe;
            padding: 15px 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 15px;
            margin: 20px 0;
            border: 1px dashed #5865f2;
            position: relative;
            overflow: hidden;
        }

        .system-message::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: #5865f2;
        }

        .system-message strong {
            color: #fff;
        }

        /* المرفقات */
        .attachment-link {
            color: #5865f2;
            text-decoration: none;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: #202225;
            border-radius: 8px;
            margin: 5px 0;
        }

        .attachment-link:hover {
            background: #2f3136;
            color: #57f287;
        }

        /* أزرار التحكم */
        .action-buttons {
            display: flex;
            gap: 15px;
            padding: 25px 30px;
            background: #2f3136;
            border-top: 2px solid #40444b;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-primary:hover {
            background: #4752c4;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #57f287;
            color: #2f3136;
        }

        .btn-success:hover {
            background: #46c572;
            transform: translateY(-2px);
        }

        .footer {
            background: #202225;
            padding: 20px 30px;
            color: #72767d;
            font-size: 14px;
            text-align: center;
            border-top: 2px solid #40444b;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #fff;
        }
        
        .loading-spinner {
            border: 4px solid #40444b;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="transcript-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>⏳ جاري تحميل بيانات التذكرة من El Omda Ticket...</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
    
        function formatDate(timestamp) {
            if (!timestamp) return 'غير محدد';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('ar-EG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
        }
    
        function getDuration(seconds) {
            if (!seconds) return 'غير محدد';
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            if (minutes > 0) return `${minutes} دقيقة و ${secs} ثانية`;
            return `${secs} ثانية`;
        }

        // ⭐⭐⭐ دالة تحويل اللون الهكس إلى لون مقروء
        function hexToRgb(hex) {
            if (!hex) return null;
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(c => c + c).join('');
            }
            if (hex.length === 6) {
                const r = parseInt(hex.substring(0, 2), 16);
                const g = parseInt(hex.substring(2, 4), 16);
                const b = parseInt(hex.substring(4, 6), 16);
                return { r, g, b };
            }
            return null;
        }

        // ⭐⭐⭐ دالة حساب تباين النص (أبيض أو أسود)
        function getContrastColor(hexColor) {
            const rgb = hexToRgb(hexColor);
            if (!rgb) return '#ffffff';
            const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#ffffff';
        }

        // ⭐⭐⭐ دالة معالجة الألوان الحقيقية للرتب
        function processRoleColors(ticketData) {
            const roleColors = {};
            
            // استخدام الألوان من البيانات إذا كانت موجودة
            if (ticketData.roleColors) {
                Object.assign(roleColors, ticketData.roleColors);
            }
            
            // إضافة ألوان افتراضية للرتب المعروفة
            const defaultColors = {
                'ادارة': '#f04747',
                'admin': '#f04747',
                'owner': '#faa61a',
                'المالك': '#faa61a',
                'مدير': '#faa61a',
                'مطور': '#9b59b6',
                'developer': '#9b59b6',
                'دعم': '#43b581',
                'support': '#43b581',
                'حرامي': '#f04747', // ⭐ رتبة حرامي باللون الأحمر
                'harami': '#f04747',
                'مساعد': '#3498db',
                'helper': '#3498db',
                'عضو': '#95a5a6',
                'member': '#95a5a6',
                'vip': '#ff8c42',
                'مميز': '#ff8c42',
                'booster': '#ff7b9c',
                'داعم': '#ff7b9c'
            };
            
            // تطبيق الألوان الافتراضية على الرتب
            if (ticketData.roles) {
                Object.keys(ticketData.roles).forEach(roleId => {
                    const roleName = ticketData.roles[roleId];
                    if (roleName && !roleColors[roleId]) {
                        const lowerName = roleName.toLowerCase();
                        for (const [key, color] of Object.entries(defaultColors)) {
                            if (lowerName.includes(key)) {
                                roleColors[roleId] = color;
                                break;
                            }
                        }
                    }
                });
            }
            
            return roleColors;
        }
    
        function renderTranscript(ticketData) {
            const container = document.getElementById('transcript-container');
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = 'none';
            
            if (!ticketData) {
                container.innerHTML = '<div style="text-align:center;padding:60px;color:#f44336;font-size:18px;">❌ بيانات غير صالحة</div>';
                return;
            }
            
            const users = ticketData.users || {};
            const roles = ticketData.roles || {};
            const roleColors = processRoleColors(ticketData);
            
            let messagesHtml = '';
            
            // رسالة فتح التذكرة
            const openerName = users[ticketData.userId] || ticketData.userName || 'مستخدم';
            messagesHtml += `<div class="system-message"><strong>📌 تم فتح التذكرة</strong> بواسطة <strong>${openerName}</strong> في ${formatDate(ticketData.openedAt)}</div>`;
            
            // ⭐⭐⭐ تنسيق الأسئلة بشكل منفصل وجميل
            if (ticketData.answers) {
                const answers = ticketData.answers;
                const questions = ticketData.questions || {};
                
                let questionsHtml = '<div class="questions-box">';
                questionsHtml += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;"><span style="background:#5865f2;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;">📝</span><span style="color:#fff;font-size:18px;font-weight:700;">إجابات الأسئلة</span></div>';
                
                if (answers.answer1) {
                    questionsHtml += `
                        <div class="question-item">
                            <div class="question-label"><i>❓</i> ${questions.required1 || 'السؤال الأول'}</div>
                            <div class="question-answer">${answers.answer1}</div>
                        </div>
                    `;
                }
                
                if (answers.answer2) {
                    questionsHtml += `
                        <div class="question-item">
                            <div class="question-label"><i>❓</i> ${questions.required2 || 'السؤال الثاني'}</div>
                            <div class="question-answer">${answers.answer2}</div>
                        </div>
                    `;
                }
                
                if (answers.answer3 && answers.answer3 !== 'لم يتم الإجابة') {
                    questionsHtml += `
                        <div class="question-item">
                            <div class="question-label"><i>❓</i> ${questions.optional1 || 'سؤال اختياري'}</div>
                            <div class="question-answer">${answers.answer3}</div>
                        </div>
                    `;
                }
                
                questionsHtml += '</div>';
                
                messagesHtml += `
                    <div class="message">
                        <img class="avatar" src="${ticketData.userAvatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                        <div class="message-content">
                            <div class="message-header">
                                <span class="author">${openerName}</span>
                                <span class="timestamp">${formatDate(ticketData.openedAt)}</span>
                            </div>
                            ${questionsHtml}
                        </div>
                    </div>
                `;
            }
    
            // الرسائل
            if (ticketData.messages && ticketData.messages.length > 0) {
                ticketData.messages.forEach(msg => {
                    const isBot = msg.authorId === ticketData.botId;
                    const isSupport = ticketData.addedAdmins?.includes(msg.authorId) || msg.authorId === ticketData.claimedBy;
                    const authorClass = isBot ? 'bot' : (isSupport ? 'support' : '');
                    
                    const authorName = users[msg.authorId] || msg.author || msg.authorUsername || 'مستخدم';
                    
                    // معالجة المحتوى
                    let displayContent = msg.content || '';
                    
                    // منشن المستخدمين
                    displayContent = displayContent.replace(/<@!?(\d+)>/g, (match, id) => {
                        const userName = users[id];
                        if (userName) {
                            return `<span class="user-mention" title="ID: ${id}">@${userName}</span>`;
                        }
                        return `<span class="user-mention" title="ID: ${id}">@مستخدم</span>`;
                    });
                    
                    // ⭐⭐⭐ منشن الرتب - الأهم هنا مع الألوان الحقيقية
                    displayContent = displayContent.replace(/<@&(\d+)>/g, (match, id) => {
                        const roleName = roles[id];
                        if (roleName) {
                            const bgColor = roleColors[id] || '#5865f2';
                            const textColor = getContrastColor(bgColor);
                            return `<span class="role-mention" style="background: ${bgColor}; color: ${textColor};" title="ID: ${id}">@${roleName}</span>`;
                        }
                        return match;
                    });
                    
                    messagesHtml += `
                        <div class="message">
                            <img class="avatar" src="${msg.avatar || 'https://cdn.discordapp.com/embed/avatars/0.png'}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="author ${authorClass}">${authorName} ${isBot ? '🤖' : ''}</span>
                                    <span class="timestamp">${formatDate(msg.timestamp)}</span>
                                </div>
                                <div class="message-text">${displayContent}</div>
                    `;
                    
                    // الامبيدات
                    if (msg.embeds && msg.embeds.length > 0) {
                        msg.embeds.forEach(embed => {
                            messagesHtml += `<div class="embed" style="border-right-color: ${embed.color || '#5865f2'}">`;
                            if (embed.title) messagesHtml += `<div class="embed-title">${embed.title}</div>`;
                            if (embed.description) messagesHtml += `<div class="embed-description">${embed.description}</div>`;
                            
                            if (embed.fields) {
                                embed.fields.forEach(field => {
                                    let fieldValue = field.value || '';
                                    
                                    // معالجة المنشنات في قيمة الحقل
                                    fieldValue = fieldValue.replace(/<@!?(\d+)>/g, (m, id) => {
                                        const name = users[id];
                                        return name ? `@${name}` : m;
                                    }).replace(/<@&(\d+)>/g, (m, id) => {
                                        const roleName = roles[id];
                                        return roleName ? `@${roleName}` : m;
                                    });
                                    
                                    messagesHtml += `
                                        <div class="embed-field">
                                            <div class="embed-field-name">${field.name}</div>
                                            <div class="embed-field-value">${fieldValue}</div>
                                        </div>
                                    `;
                                });
                            }
                            
                            if (embed.image) messagesHtml += `<img class="embed-image" src="${embed.image}" loading="lazy">`;
                            messagesHtml += `</div>`;
                        });
                    }
                    
                    // المرفقات
                    if (msg.attachments && msg.attachments.length > 0) {
                        msg.attachments.forEach(att => {
                            messagesHtml += `<div style="margin-top:10px;"><a class="attachment-link" href="${att.url}" target="_blank" rel="noopener noreferrer">📎 ${att.name}</a></div>`;
                        });
                    }
                    
                    messagesHtml += `</div></div>`;
                });
            }
    
            // رسالة الاستلام
            if (ticketData.claimedByName && ticketData.claimedByName !== 'لم يتم الاستلام' && ticketData.claimedAt) {
                const claimerName = users[ticketData.claimedBy] || ticketData.claimedByName;
                messagesHtml += `<div class="system-message"><strong>✅ تم استلام التذكرة</strong> بواسطة <strong>${claimerName}</strong> في ${formatDate(ticketData.claimedAt)}</div>`;
            }
    
            // رسالة الإغلاق
            if (ticketData.closedAt) {
                const closerName = users[ticketData.closedBy] || ticketData.closedByName || 'غير معروف';
                messagesHtml += `<div class="system-message"><strong>🔒 تم إغلاق التذكرة</strong> بواسطة <strong>${closerName}</strong><br>📝 السبب: ${ticketData.closeReason || 'غير محدد'}<br>⏱️ المدة: ${getDuration(ticketData.duration)}</div>`;
            }
    
            // العرض النهائي
            const fullHtml = `
                <div class="header">
                    <h1>📋 نسخة التذكرة <span>${ticketData.fullId || ticketData.id || 'غير معروف'}</span></h1>
                    <div class="ticket-info">
                        <div><strong>👤</strong> ${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div>
                        <div><strong>📂</strong> ${ticketData.category || 'قسم غير محدد'}</div>
                        <div><strong>📅</strong> ${formatDate(ticketData.openedAt)}</div>
                        ${ticketData.closedAt ? `<div><strong>🔒</strong> ${formatDate(ticketData.closedAt)}</div>` : ''}
                    </div>
                </div>
    
                <div class="info-bar">
                    <div class="info-item"><div class="label">صاحب التذكرة</div><div class="value user">${users[ticketData.userId] || ticketData.userName || 'مستخدم'}</div></div>
                    <div class="info-item"><div class="label">القسم</div><div class="value">${ticketData.category || 'غير محدد'}</div></div>
                    <div class="info-item"><div class="label">المسؤول</div><div class="value">${users[ticketData.claimedBy] || ticketData.claimedByName || 'لم يتم الاستلام'}</div></div>
                    <div class="info-item"><div class="label">الحالة</div><div class="value">${ticketData.closedAt ? 'مغلقة' : 'مفتوحة'}</div></div>
                    <div class="info-item"><div class="label">إجمالي الرسائل</div><div class="value">${ticketData.messageCount || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات المستخدم</div><div class="value">${ticketData.userMentions || 0}</div></div>
                    <div class="info-item"><div class="label">استدعاءات الدعم</div><div class="value">${ticketData.adminMentions || 0}</div></div>
                    <div class="info-item"><div class="label">الأداريين المضافين</div><div class="value">${ticketData.addedAdmins?.length || 0}</div></div>
                </div>
    
                <div class="chat-container">
                    ${messagesHtml}
                </div>
    
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.print()">🖨️ طباعة</button>
                    <button class="btn btn-success" onclick="downloadTranscript()">📥 تحميل HTML</button>
                </div>
    
                <div class="footer">
                    <p>El Omda Ticket • تم إنشاء هذه النسخة في ${formatDate(Math.floor(Date.now() / 1000))}</p>
                    <p style="margin-top:8px;font-size:12px;">جميع الحقوق محفوظة © 2026</p>
                </div>
            `;
    
            container.innerHTML = fullHtml;
        }
    
        function downloadTranscript() {
            const content = document.getElementById('transcript-container').innerHTML;
            const styles = document.querySelector('style').innerHTML;
            const html = `<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>نسخة التذكرة - El Omda Ticket</title><style>${styles}</style></head><body>${content}</body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ticket-${new Date().getTime()}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }
    
        window.onload = async function() {
            const container = document.getElementById('transcript-container');
            const urlParam = getUrlParameter('url');
            const dataParam = getUrlParameter('data');
            
            try {
                if (urlParam) {
                    const response = await fetch(urlParam);
                    if (response.ok) {
                        const ticketData = await response.json();
                        renderTranscript(ticketData);
                        return;
                    }
                }
                
                if (dataParam) {
                    const ticketData = JSON.parse(decodeURIComponent(dataParam));
                    renderTranscript(ticketData);
                    return;
                }
                
                container.innerHTML = `<div class="system-message" style="padding:60px;">❌ لا توجد بيانات للتذكرة</div>`;
            } catch (error) {
                container.innerHTML = `<div class="system-message" style="padding:60px;color:#f44336;">❌ خطأ: ${error.message}</div>`;
            }
        };
    </script>
</body>
</html>
