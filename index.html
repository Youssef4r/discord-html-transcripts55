<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎫 معاينة التذكرة - نظام التذاكر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1f22;
            font-family: 'Whitney', 'Helvetica Neue', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: #fff;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #3c3f45;
            border-top: 4px solid #5865f2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #2b2d31;
            color: #ed4245;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            max-width: 400px;
        }

        .error h2 {
            margin-bottom: 15px;
        }

        .error p {
            color: #b5bac1;
            margin-bottom: 10px;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            background: #1e1f22;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>⏳ جاري تحميل التذكرة...</p>
        </div>
    </div>

    <script>
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(window.location.search);
            return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        window.onload = async function() {
            const app = document.getElementById('app');
            const loading = document.getElementById('loading');
            
            const urlParam = getUrlParameter('url');
            const downloadParam = getUrlParameter('download');
            
            if (!urlParam) {
                loading.style.display = 'none';
                app.innerHTML = `
                    <div class="error">
                        <h2>❌ خطأ</h2>
                        <p>لم يتم تحديد رابط التذكرة</p>
                        <p style="font-size: 12px; margin-top: 20px;">الرجاء استخدام الرابط المقدم من البوت</p>
                    </div>
                `;
                return;
            }

            try {
                // إذا كان المطلوب تحميل الملف
                if (downloadParam === 'true') {
                    window.location.href = urlParam;
                    return;
                }

                // عرض الملف في iframe
                app.innerHTML = `<iframe src="${urlParam}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>`;
                loading.style.display = 'none';
                
            } catch (error) {
                loading.style.display = 'none';
                app.innerHTML = `
                    <div class="error">
                        <h2>❌ خطأ في التحميل</h2>
                        <p>${error.message}</p>
                        <p style="margin-top: 20px;">
                            <a href="${urlParam}" target="_blank" style="color: #5865f2;">📥 تحميل الملف مباشرة</a>
                        </p>
                    </div>
                `;
            }
        };
    </script>
</body>
</html>
