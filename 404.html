<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        body {
            background: #36393f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .error-box {
            background: #2f3136;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            border: 1px solid #40444b;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #5865f2;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #5865f2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        a:hover {
            background: #4752c4;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>404</h1>
        <h2>😵 الصفحة غير موجودة</h2>
        <p>عذراً، الصفحة التي تبحث عنها غير متوفرة أو تم نقلها</p>
        <a href="/">العودة للصفحة الرئيسية</a>
    </div>
</body>
</html>
