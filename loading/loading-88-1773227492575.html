
<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحميل التذكرة - دعم فني-88 (رقم 88)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 5px solid white;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin: 20px 0;
            font-size: 24px;
        }
        p {
            margin: 10px 0;
            font-size: 16px;
            opacity: 0.9;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: white;
            width: 0%;
            animation: progress 3s ease-in-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .ticket-id {
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
        }
        .redirect-message {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
    <meta http-equiv="refresh" content="5;url=https://raw.githubusercontent.com/youssef4r/discord-html-transcripts55/main/transcripts/ticket-88-1773227492575.html">
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>⏳ جاري تحميل التذكرة</h1>
        <p>نقوم بتجهيز محادثة التذكرة رقم <strong>دعم فني-88 (رقم 88)</strong></p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="ticket-id">
            🎫 دعم فني-88 (رقم 88)
        </div>
        <p class="redirect-message">
            سيتم تحويلك تلقائياً بعد 5 ثواني<br>
            إذا لم يتم التحويل <a href="https://raw.githubusercontent.com/youssef4r/discord-html-transcripts55/main/transcripts/ticket-88-1773227492575.html" style="color: white; font-weight: bold;">اضغط هنا</a>
        </p>
    </div>
</body>
</html>
